<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      text-align: center;
      background: rgba(0,0,0,0.3);
      padding: 25px;
      border-radius: 15px;
      width: 90%;
      max-width: 350px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn1 { background: #00c6ff; color: black; }
    .btn2 { background: #f7971e; color: black; }

    .hasil {
      margin-top: 15px;
      padding: 10px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Mini App 🔥</h2>

    <button class="btn1" onclick="aksi1()">Action 1</button>
    <button class="btn2" onclick="aksi2()">Action 2</button>

    <div class="hasil" id="hasil">
      Hasil akan muncul di sini
    </div>
  </div>

  <script>
    function aksi1() {
      document.getElementById("hasil").innerText = "Kamu klik Action 1 🚀";
    }

    function aksi2() {
      document.getElementById("hasil").innerText = "Kamu klik Action 2 🔥";
    }

    // Telegram WebApp
    if (window.Telegram?.WebApp) {
      let tg = window.Telegram.WebApp;
      tg.expand();
    }
  </script>

</body>
</html>
