<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drama China VIP</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;

.header {
  padding: 15px;
  background: #1e293b;
  font-size: 20px;

.card {
  background: #1e293b;
  margin: 15px;
  padding: 15px;
  border-radius: 10px;

  width: 90%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;

}

<body>

<div class="header">🎬 Drama China Viral</div>

<div class="card">
  <h3>CEO Nikahi Cewek Miskin?! 😱</h3>
  <p>Episode lanjutannya makin panas 🔥</p>

  <button class="free" onclick="freeAccess()">
    🎬 Tonton Gratis (Iklan)
  </button>

  <button class="vip" onclick="vipAccess()">
    💎 Unlock VIP
  </button>
</div>

<script>

// ===== GANTI LINK IKLAN DI SINI =====
function freeAccess() {
  window.location.href = "https://link-iklan-kamu.com";
}

// ===== SISTEM VIP =====
const tg = window.Telegram?.WebApp;

// GANTI ID VIP
const vipUsers = [123456789];

function vipAccess() {
  const userId = tg?.initDataUnsafe?.user?.id;

  if (vipUsers.includes(userId)) {
    alert("✅ VIP aktif!\n\nMasuk sini:\nhttps://t.me/channelvipkamu");
  } else {
    alert("🔒 Khusus VIP\n\nKlik beli VIP ya!");
  }
}

</script>
