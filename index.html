<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Drama App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial;
    }

    .header {
      text-align: center;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      background: #1c1c1c;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 10px;
    }

    .card {
      background: #1c1c1c;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(0.97);
    }

    .card img {
      width: 100%;
    }

    .card p {
      padding: 8px;
      font-size: 14px;
    }

    .vip {
      background: gold;
      color: black;
      padding: 3px 6px;
      font-size: 10px;
      border-radius: 5px;
    }

    .player {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 999;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .close {
      position: absolute;
      top: 10px;
      right: 10px;
      background: red;
      padding: 8px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="header">🎬 Drama Hub</div>

<div class="grid">

  <div class="card" onclick="play('https://www.youtube.com/embed/dQw4w9WgXcQ')">
    <img src="https://via.placeholder.com/300x200">
    <p>Drama VIP <span class="vip">VIP</span></p>
  </div>

  <div class="card" onclick="play('https://www.youtube.com/embed/ysz5S6PUM-U')">
    <img src="https://via.placeholder.com/300x200">
    <p>Drama Gratis</p>
  </div>

</div>

<div class="player" id="player">
  <div class="close" onclick="closePlayer()">❌</div>
  <iframe id="video"></iframe>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  function play(url) {
    document.getElementById("player").style.display = "block";
    document.getElementById("video").src = url;
  }

  function closePlayer() {
    document.getElementById("player").style.display = "none";
    document.getElementById("video").src = "";
  }
</script>

</body>
</html>
